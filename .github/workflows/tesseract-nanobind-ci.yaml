name: Tesseract Nanobind CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tesseract_nanobind_benchmark/**'
      - '.github/workflows/tesseract-nanobind-ci.yaml'
      - 'justfile'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tesseract_nanobind_benchmark/**'
      - '.github/workflows/tesseract-nanobind-ci.yaml'
      - 'justfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Takumi Guard (PyPI)
      uses: flatt-security/setup-takumi-guard-pypi@733047c120b6377fa05fb77f714df8d8cd3a41a9 # v1

    - name: Install system dependencies (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          tesseract-ocr \
          libtesseract-dev \
          libleptonica-dev \
          pkg-config \
          cmake \
          ninja-build

    - name: Install build tools (uv and just)
      run: |
        python -m pip install --upgrade pip
        pip install uv
        pipx install rust-just

    - name: Build package
      run: |
        just tesseract-build

    - name: Run tests
      run: |
        just tesseract-test

  compatibility-test:
    name: Compatibility Test (tesserocr API)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'

    - name: Set up Takumi Guard (PyPI)
      uses: flatt-security/setup-takumi-guard-pypi@733047c120b6377fa05fb77f714df8d8cd3a41a9 # v1

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          tesseract-ocr \
          libtesseract-dev \
          libleptonica-dev \
          pkg-config \
          cmake \
          ninja-build

    - name: Install build tools (uv and just)
      run: |
        python -m pip install --upgrade pip
        pip install uv
        pipx install rust-just

    - name: Install tesserocr for compatibility testing
      run: |
        pip install tesserocr pillow>=12.0 numpy>=2.0 pytest>=9.0

    - name: Build package
      run: |
        just tesseract-build

    - name: Run compatibility tests
      working-directory: tesseract_nanobind_benchmark
      run: |
        python -m pytest tests/test_compat.py -v

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'

    - name: Set up Takumi Guard (PyPI)
      uses: flatt-security/setup-takumi-guard-pypi@733047c120b6377fa05fb77f714df8d8cd3a41a9 # v1

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          tesseract-ocr \
          libtesseract-dev \
          libleptonica-dev \
          pkg-config \
          cmake \
          ninja-build

    - name: Install build tools (uv and just)
      run: |
        python -m pip install --upgrade pip
        pip install uv
        pipx install rust-just

    - name: Install benchmark dependencies
      run: |
        pip install pytesseract tesserocr pillow>=12.0 numpy>=2.0

    - name: Build package
      run: |
        just tesseract-build

    - name: Initialize submodules for test images
      run: |
        git submodule update --init --depth 1 external/pytesseract
        git submodule update --init --depth 1 external/tesserocr

    - name: Run comprehensive benchmark
      run: |
        just tesseract-benchmark > tesseract_nanobind_benchmark/benchmark_results.txt
        cat tesseract_nanobind_benchmark/benchmark_results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: benchmark-results
        path: tesseract_nanobind_benchmark/benchmark_results.txt

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'

    - name: Set up Takumi Guard (PyPI)
      uses: flatt-security/setup-takumi-guard-pypi@733047c120b6377fa05fb77f714df8d8cd3a41a9 # v1

    - name: Install build tools (uv and just)
      run: |
        python -m pip install --upgrade pip
        pip install uv
        pipx install rust-just

    - name: Run code quality checks
      run: |
        just tesseract-check
